{% extends "account/base.html" %}

{% block account_content %}
<h2 class="mb-4 text-center">Login</h2>
<form method="post" action="{% url 'account_login' %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_login" class="form-label">Email</label>
        <input type="email" name="login" class="form-control" id="id_login" placeholder="you@example.com" required>
    </div>
    <div class="mb-3">
        <label for="id_password" class="form-label">Password</label>
        <input type="password" name="password" class="form-control" id="id_password" required>
    </div>
    {% if redirect_field_value %}
    <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
    {% endif %}
    <button type="submit" class="btn btn-plurino w-100">Login</button>
</form>
<p class="text-center mt-3 text-muted small">
    Don't have an account? <a href="{% url 'account_signup' %}">Sign up</a>
</p>
{% endblock %}
