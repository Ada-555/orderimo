{% extends "account/base.html" %}

{% block account_content %}
<div class="text-center">
    <i class="bi bi-envelope-check fs-1 text-accent mb-3 d-block"></i>
    <h2 class="mb-3">Check Your Email</h2>
    <p class="text-muted mb-2">We've sent a confirmation link to:</p>
    <p class="fw-bold mb-4">{{ email }}</p>
    <p class="small text-muted">In local dev, emails print to the console. Check the terminal running the server.</p>
    <a href="{{ login_url }}" class="btn btn-plurino mt-3">Back to Login</a>
</div>
{% endblock %}
