{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <h2>Order #{{ order.order_number }}</h2>
                <p class="text-muted">Complete your payment to confirm the order.</p>
                <p class="h3 text-accent">Total: €{{ order.grand_total|floatformat:2 }}</p>
            </div>
            <div class="card p-4">
                <div id="stripe-card-element" class="mb-3 p-3 border rounded"></div>
                <button id="pay-btn" class="btn btn-plurino btn-lg w-100">
                    <i class="bi bi-lock me-2"></i> Pay €{{ order.grand_total|floatformat:2 }}
                </button>
                <p class="small text-muted text-center mt-3">
                    <i class="bi bi-shield-check"></i> Secured by Stripe
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://js.stripe.com/v3/"></script>
<script>
const stripe = Stripe('{{ stripe_public_key }}');
const elements = stripe.elements();
const cardElement = elements.create('card');
cardElement.mount('#stripe-card-element');

document.getElementById('pay-btn').onclick = async () => {
    const btn = document.getElementById('pay-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';

    const { error, paymentIntent } = await stripe.confirmCardPayment('{{ client_secret }}', {
        payment_method: { card: cardElement }
    });

    if (error) {
        alert(error.message);
        btn.disabled = false;
        btn.innerHTML = 'Pay';
    } else if (paymentIntent.status === 'succeeded') {
        await fetch("{% url 'checkout:payment_success' %}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}'},
            body: JSON.stringify({ payment_intent: paymentIntent.id })
        });
        window.location.href = "{% url 'checkout:payment_success' %}";
    }
};
</script>
{% endblock %}
