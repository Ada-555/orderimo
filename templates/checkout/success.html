{% extends "base.html" %}

{% block content %}
<div class="container py-5 text-center">
    <div class="mb-4">
        <i class="bi bi-check-circle-fill text-success fs-1"></i>
    </div>
    <h1 class="mb-3">Order Confirmed!</h1>
    <p class="lead text-muted mb-2">Order #<strong>{{ order.order_number }}</strong></p>
    <p class="text-muted mb-4">A confirmation email has been sent to {{ order.email }}</p>
    <div class="d-flex gap-3 justify-content-center">
        <a href="{% url 'orders:order_detail' order.order_number %}" class="btn btn-plurino">View Order</a>
        <a href="{% url 'products:product_list' %}" class="btn btn-outline-light">Continue Shopping</a>
    </div>
</div>
{% endblock %}
