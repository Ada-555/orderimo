{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4">Delete {{ product.name }}?</h1>
    <p class="text-muted">This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'products:product_list' %}" class="btn btn-outline-light">Cancel</a>
    </form>
</div>
{% endblock %}
